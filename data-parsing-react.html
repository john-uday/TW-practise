<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function Parent(){
            const [pd,spd]=React.useState("");
             const [d,sd]=React.useState("");
            function getdata(ev){
                spd(ev.target.value);
            }
            function setcdata(data){
                sd(data);
            }
            return(
                <div>
                    
                    <input type="text" onChange={getdata}/>
                    <h1>parent component</h1>
                    <h1>parent data:{pd}</h1>
                    <p>child data:{d}</p>
                    <Child data={pd} pdata={setcdata}/>
                </div>
            );
        }
        function Child(props){
             const [cd,scd]=React.useState("");
            function getdata(ev){
                scd(ev.target.value);
                props.pdata(ev.target.value);
            }
            return(
                <div>
                    <input type="text" onChange={getdata}/>
                    <h1>child component</h1>
                    <h1>child data:{cd}</h1>
                    <p>parent data:{props.data}</p>
                </div>
            );
        }
        ReactDOM.render(<Parent/>,document.getElementById("root"));
    </script>

</body>
</html>
